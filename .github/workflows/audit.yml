name: Security Audit

on:
  schedule:
    - cron: '0 8 * * 1'
  push:
    branches: [main, develop]
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'deny.toml'
  workflow_dispatch:

permissions:
  contents: read

env:
  AUDIT_DB_PATH: ${{ github.workspace }}/.cargo-advisory-db

jobs:
  audit:
    name: 安全与依赖策略检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit

      - name: Install cargo-deny
        run: cargo install --locked cargo-deny

      - name: Run security audit across products
        shell: bash
        run: |
          set -euo pipefail
          cargo audit -d "$AUDIT_DB_PATH" --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2026-0104 -f robot_control_rust/Cargo.lock
          cargo audit -d "$AUDIT_DB_PATH" --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2026-0104 -f rust_tools_suite/Cargo.lock

      - name: Run dependency policy checks across products
        shell: bash
        run: |
          set -euo pipefail
          (cd robot_control_rust && cargo deny check advisories bans sources --config "$GITHUB_WORKSPACE/deny.toml")
          (cd rust_tools_suite && cargo deny check advisories bans sources --config "$GITHUB_WORKSPACE/deny.toml")
