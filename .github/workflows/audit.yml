name: Security Audit

on:
  schedule:
    - cron: '0 8 * * 1'
  push:
    branches: [main, develop]
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'deny.toml'
  workflow_dispatch:

permissions:
  contents: read

env:
  AUDIT_DB_PATH: ${{ github.workspace }}/.cargo-advisory-db
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  audit:
    name: Security and Dependency Policy Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit

      - name: Install cargo-deny
        run: cargo install --locked cargo-deny

      - name: Run security audit
        shell: bash
        run: |
          set -euo pipefail
          cargo audit -d "$AUDIT_DB_PATH" --ignore RUSTSEC-2023-0071

      - name: Run dependency policy checks
        shell: bash
        run: |
          set -euo pipefail
          cargo deny check advisories bans sources --config deny.toml