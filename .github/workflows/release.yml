name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify-tag:
    name: Verify Tag Policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate tag format and branch ancestry
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::Invalid tag format: $TAG"
            exit 1
          fi

          git fetch origin main master --quiet || true
          if git show-ref --verify --quiet refs/remotes/origin/main; then
            git merge-base --is-ancestor HEAD origin/main || echo "::warning::Not on main"
          fi
          if git show-ref --verify --quiet refs/remotes/origin/master; then
            git merge-base --is-ancestor HEAD origin/master || echo "::warning::Not on master"
          fi

          echo "::notice::Tag verified."
          exit 0

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: verify-tag
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config libgtk-3-dev
      - name: Run quality gate
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
          cargo test --all
          RUSTDOCFLAGS="-D warnings" cargo doc --no-deps

  build-windows-assets:
    name: Build Windows Release Assets
    runs-on: windows-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: mdbook
      - name: Build robot_control
        shell: pwsh
        run: cargo build --release -p robot_control
      - name: Build tools_suite
        shell: pwsh
        run: cargo build --release -p tools_suite
      - name: Create portable zip artifacts
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}' -replace '^v', ''
          $outDir = "release_artifacts"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          
          # Robot Control
          Compress-Archive -Path "target/release/robot_control.exe" -DestinationPath "$outDir/robot_control_rust_${version}_windows_x64_portable.zip" -Force
          
          # Tools Suite
          Compress-Archive -Path "target/release/tools_suite.exe" -DestinationPath "$outDir/rust_tools_suite_${version}_windows_x64_portable.zip" -Force
          
          Write-Host "Created artifacts in $outDir"
      - name: Upload Windows release assets
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-assets
          path: release_artifacts/*.zip

  build-linux-assets:
    name: Build Linux Release Assets
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: mdbook
      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config libgtk-3-dev dpkg-dev
      - name: Build robot_control
        run: cargo build --release -p robot_control
      - name: Build tools_suite
        run: cargo build --release -p tools_suite
      - name: Create Debian package
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          
          # Create debian package structure
          pkg_dir="dist/debian"
          mkdir -p "$pkg_dir/usr/local/bin"
          mkdir -p "$pkg_dir/usr/local/share/applications"
          
          # Install binaries
          cp target/release/robot_control "$pkg_dir/usr/local/bin/"
          cp target/release/tools_suite "$pkg_dir/usr/local/bin/"
          
          # Create control file
          mkdir -p "$pkg_dir/DEBIAN"
          cat > "$pkg_dir/DEBIAN/control" << CONTROL
          Package: robot-control-suite
          Version: $version
          Section: utils
          Priority: optional
          Architecture: amd64
          Description: Robot Control and Tools Suite
          CONTROL
          
          # Build package
          dpkg-deb --build "$pkg_dir" "dist/robot_tools_suite_${version}_amd64.deb"
      - name: Upload Linux release assets
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-assets
          path: dist/*.deb

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows-assets
      - build-linux-assets
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: windows-release-assets
          path: artifacts
      - uses: actions/download-artifact@v4
        with:
          name: linux-release-assets
          path: artifacts
      - name: Create checksums
        shell: bash
        run: |
          set -euo pipefail
          cd artifacts
          sha256sum *.zip *.deb > checksums-sha256.txt
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/*.zip
            artifacts/*.deb
            artifacts/checksums-sha256.txt