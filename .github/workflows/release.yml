name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify-tag:
    name: Verify Tag Policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate tag format and branch ancestry
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::Invalid tag format: $GITHUB_REF_NAME"
            exit 1
          fi
          TAG="$GITHUB_REF_NAME"

          git fetch origin main master --quiet || true
          if git show-ref --verify --quiet refs/remotes/origin/main; then
            git merge-base --is-ancestor HEAD origin/main || echo "::warning::Not on main"
          fi
          if git show-ref --verify --quiet refs/remotes/origin/master; then
            git merge-base --is-ancestor HEAD origin/master || echo "::warning::Not on master"
          fi

          echo "::notice::Tag verified."
          exit 0

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: verify-tag
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config libgtk-3-dev
      - name: Run quality gate
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
          cargo test --all
          RUSTDOCFLAGS="-D warnings" cargo doc --no-deps

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress
      - name: Build binaries
        shell: pwsh
        run: |
          cargo build --release -p robot_control
          cargo build --release -p tools_suite
          cargo build --release -p devtools
      - name: Create Windows installer
        shell: pwsh
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          $version = "$env:VERSION" -replace '^v', ''
          if ($version -notmatch '^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$') {
            Write-Error "Invalid version format: $version"
            exit 1
          }
          $content = Get-Content ".github/workflows/installer.nsi" -Raw
          $content = $content -replace '\$\{VERSION\}', $version
          $content = $content -replace '\$VERSION', $version
          $content | Out-File -FilePath "installer.nsi" -Encoding UTF8
          & "C:\Program Files (x86)\NSIS\makensis.exe" "installer.nsi"
      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: robot_control_suite_*_windows_x64-setup.exe

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build binaries
        run: |
          cargo build --release -p robot_control
          cargo build --release -p tools_suite
          cargo build --release -p devtools
      - name: Create Debian package
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${VERSION#v}"

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::Invalid version format: $version"
            exit 1
          fi

          pkg_dir="dist/debian"
          mkdir -p "$pkg_dir/usr/local/bin"
          mkdir -p "$pkg_dir/usr/local/share/applications"

          cp target/release/robot_control "$pkg_dir/usr/local/bin/"
          cp target/release/tools_suite "$pkg_dir/usr/local/bin/"
          cp target/release/devtools "$pkg_dir/usr/local/bin/"

          mkdir -p "$pkg_dir/DEBIAN"
          printf '%s\n' \
            "Package: robot-control-suite" \
            "Version: ${version}" \
            "Section: utils" \
            "Priority: optional" \
            "Architecture: amd64" \
            "Description: Robot Control and Tools Suite" \
            > "$pkg_dir/DEBIAN/control"

          dpkg-deb --build "$pkg_dir" "dist/robot_control_suite_${version}_amd64.deb"
      - name: Upload Linux package
        uses: actions/upload-artifact@v4
        with:
          name: linux-package
          path: dist/*_amd64.deb

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-linux
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts
      - uses: actions/download-artifact@v4
        with:
          name: linux-package
          path: artifacts
      - name: Create checksums
        shell: bash
        run: |
          set -euo pipefail
          cd artifacts
          sha256sum *.exe *.deb > checksums-sha256.txt
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/*.exe
            artifacts/*.deb
            artifacts/checksums-sha256.txt
