name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify-tag:
    name: Verify Tag Policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate tag format and branch ancestry
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::Invalid tag format: $TAG"
            exit 1
          fi

          git fetch origin main master --quiet || true
          if git show-ref --verify --quiet refs/remotes/origin/main; then
            git merge-base --is-ancestor HEAD origin/main && exit 0
          fi
          if git show-ref --verify --quiet refs/remotes/origin/master; then
            git merge-base --is-ancestor HEAD origin/master && exit 0
          fi

          echo "::error::Tag commit is not on main/master history"
          exit 1

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: verify-tag
    steps:
      - uses: actions/checkout@v4
      - name: Process file residue audit
        shell: pwsh
        run: |
          ./scripts/cleanup-process-files.ps1 -Mode audit -Strict
      - name: Workspace structure guard
        shell: pwsh
        run: |
          ./scripts/enforce-workspace-structure.ps1 -Mode audit -Strict
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config libgtk-3-dev
      - name: Run release quality gate across projects
        shell: bash
        run: |
          set -euo pipefail

          run_fmt_check() {
            local project="$1"
            local manifest="$2"
            echo "::group::fmt $project"
            cargo fmt --check --manifest-path "$manifest"
            echo "::endgroup::"
          }

          run_clippy_check() {
            local project="$1"
            local manifest="$2"
            echo "::group::clippy $project"
            cargo clippy --manifest-path "$manifest" --all-targets -- -D warnings
            echo "::endgroup::"
          }

          run_test_check() {
            local project="$1"
            local manifest="$2"
            echo "::group::test $project"
            cargo test --manifest-path "$manifest"
            echo "::endgroup::"
          }

          run_doc_check() {
            local project="$1"
            local manifest="$2"
            echo "::group::doc $project"
            RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --manifest-path "$manifest"
            echo "::endgroup::"
          }

          run_fmt_check "robot_control_rust" "robot_control_rust/Cargo.toml"
          run_clippy_check "robot_control_rust" "robot_control_rust/Cargo.toml"
          run_test_check "robot_control_rust" "robot_control_rust/Cargo.toml"
          run_doc_check "robot_control_rust" "robot_control_rust/Cargo.toml"

          run_fmt_check "rust_micro_tools" "rust_micro_tools/Cargo.toml"
          run_clippy_check "rust_micro_tools" "rust_micro_tools/Cargo.toml"
          run_test_check "rust_micro_tools" "rust_micro_tools/Cargo.toml"
          run_doc_check "rust_micro_tools" "rust_micro_tools/Cargo.toml"

          for dir in rust_indie_tools/*/; do
            if [ -f "${dir}Cargo.toml" ]; then
              run_fmt_check "${dir%/}" "${dir}Cargo.toml"
              run_clippy_check "${dir%/}" "${dir}Cargo.toml"
              run_test_check "${dir%/}" "${dir}Cargo.toml"
              run_doc_check "${dir%/}" "${dir}Cargo.toml"
            fi
          done

  build-windows-assets:
    name: Build Windows Release Assets
    runs-on: windows-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build robot_control_rust.exe
        shell: pwsh
        run: |
          cargo build --release --manifest-path robot_control_rust/Cargo.toml
      - name: Smoke test executable launch
        shell: pwsh
        run: |
          $exe = 'robot_control_rust\target\release\robot_control_rust.exe'
          $logDir = 'smoke_logs'
          New-Item -ItemType Directory -Force -Path $logDir | Out-Null
          if (-not (Test-Path $exe)) {
            throw "Missing executable: $exe"
          }

          function Invoke-SmokeCase {
            param(
              [Parameter(Mandatory = $true)][string]$Name,
              [string[]]$Arguments = @(),
              [int]$TimeoutSeconds = 8,
              [int]$MinRuntimeSeconds = 2,
              [string]$RequireOutputPattern = '',
              [string]$RejectOutputPattern = 'placeholder'
            )

            $stdoutPath = Join-Path $logDir ("$Name.stdout.log")
            $stderrPath = Join-Path $logDir ("$Name.stderr.log")

            if ($null -eq $Arguments -or $Arguments.Count -eq 0) {
              $proc = Start-Process -FilePath $exe -PassThru -RedirectStandardOutput $stdoutPath -RedirectStandardError $stderrPath
              Start-Sleep -Seconds $MinRuntimeSeconds

              if ($proc.HasExited) {
                $stdout = if (Test-Path $stdoutPath) { Get-Content -Raw -Path $stdoutPath } else { '' }
                $stderr = if (Test-Path $stderrPath) { Get-Content -Raw -Path $stderrPath } else { '' }
                if (-not [string]::IsNullOrWhiteSpace($RejectOutputPattern) -and (($stdout + "`n" + $stderr) -match $RejectOutputPattern)) {
                  throw "Smoke case '$Name' exited early and matched rejected pattern '$RejectOutputPattern'. Exit=$($proc.ExitCode). Stdout=$stdout Stderr=$stderr"
                }
                # In headless CI environments GUI apps may exit early. If output does not
                # indicate placeholder fallback, accept this case.
                return
              }

              try {
                Stop-Process -Id $proc.Id -Force -ErrorAction Stop
              } catch {
                throw "Smoke case '$Name' could not stop process after validation window"
              }

              $stopped = $proc.WaitForExit($TimeoutSeconds * 1000)
              if (-not $stopped) {
                throw "Smoke case '$Name' failed to stop process within timeout"
              }

              return
            }

            $output = & $exe @Arguments 2>&1
            $outputText = ($output | Out-String).Trim()
            $outputText | Set-Content -Path $stdoutPath -Encoding utf8
            '' | Set-Content -Path $stderrPath -Encoding utf8
            if ($LASTEXITCODE -ne 0) {
              throw "Smoke case '$Name' failed with exit code $LASTEXITCODE"
            }

            if (-not [string]::IsNullOrWhiteSpace($RequireOutputPattern) -and $outputText -notmatch $RequireOutputPattern) {
              throw "Smoke case '$Name' output did not match required pattern '$RequireOutputPattern'. Output: $outputText"
            }

            if (-not [string]::IsNullOrWhiteSpace($RejectOutputPattern) -and $outputText -match $RejectOutputPattern) {
              throw "Smoke case '$Name' output matched rejected pattern '$RejectOutputPattern'. Output: $outputText"
            }
          }

          Invoke-SmokeCase -Name 'version_arg' -Arguments @('--version') -TimeoutSeconds 8
          Invoke-SmokeCase -Name 'help_arg' -Arguments @('--help') -TimeoutSeconds 8
          Invoke-SmokeCase -Name 'plain_start' -TimeoutSeconds 10 -MinRuntimeSeconds 2

          if ((Get-Item $exe).Length -lt 100KB) {
            throw "Executable size check failed: smaller than minimum expected footprint (100KB)"
          }
      - name: Upload smoke test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-smoke-logs
          path: smoke_logs/*
      - name: Build installer (Setup.exe)
        shell: pwsh
        run: |
          ./robot_control_rust/scripts/package_windows_x64_iexpress_installer.ps1 -SkipBuild
      - name: Collect release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release_artifacts | Out-Null
          $exe = 'robot_control_rust\target\release\robot_control_rust.exe'
          $setup = Get-ChildItem 'robot_control_rust\dist\windows-x64\installer\*_Setup.exe' | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $setup) {
            throw 'Setup.exe not found under robot_control_rust/dist/windows-x64/installer'
          }

          Copy-Item $exe 'release_artifacts\robot_control_rust.exe'
          Copy-Item $setup.FullName 'release_artifacts\RobotControlSuite_Setup.exe'

          Push-Location release_artifacts
          Get-FileHash -Algorithm SHA256 robot_control_rust.exe, RobotControlSuite_Setup.exe |
            ForEach-Object { "$($_.Hash.ToLower())  $($_.Path | Split-Path -Leaf)" } |
            Set-Content -Path checksums-sha256.txt -Encoding utf8
          Pop-Location
      - name: Upload Windows release assets
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-assets
          path: release_artifacts/*

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-windows-assets
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-release-assets
          path: artifacts
      - name: Verify required assets
        shell: bash
        run: |
          set -euo pipefail
          test -f artifacts/robot_control_rust.exe
          test -f artifacts/RobotControlSuite_Setup.exe
          test -f artifacts/checksums-sha256.txt
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            artifacts/robot_control_rust.exe
            artifacts/RobotControlSuite_Setup.exe
            artifacts/checksums-sha256.txt

  publish-draft-on-failure:
    name: Publish Draft Release On Failure
    if: ${{ always() && failure() }}
    runs-on: ubuntu-latest
    needs:
      - verify-tag
      - quality-gate
      - build-windows-assets
      - publish-release
    steps:
      - name: Create failure summary
        run: |
          cat > failure-summary.md << 'EOF'
          Automatic draft release generated because release workflow did not fully succeed.

          Job results:
          - verify-tag: ${{ needs.verify-tag.result }}
          - quality-gate: ${{ needs.quality-gate.result }}
          - build-windows-assets: ${{ needs.build-windows-assets.result }}
          - publish-release: ${{ needs.publish-release.result }}

          Next actions:
          1. Inspect the failed job logs.
          2. Fix the issue and re-run release workflow.
          3. Use rollback script if the tag should be revoked.
          EOF
      - name: Create Draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: failure-summary.md
