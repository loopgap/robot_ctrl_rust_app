name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-tag:
    name: Verify Tag Policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate tag format and branch ancestry
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::Invalid tag format: $TAG"
            exit 1
          fi

          git fetch origin main --quiet || true

          if ! git show-ref --verify --quiet refs/remotes/origin/main; then
            echo "::error::origin/main does not exist; cannot verify tag ancestry"
            exit 1
          fi

          if git merge-base --is-ancestor HEAD origin/main; then
            echo "::notice::Tag commit is reachable from origin/main"
          else
            echo "::error::Tag commit must be reachable from origin/main"
            exit 1
          fi

          if [[ "$TAG" != "v0.2.1" ]]; then
            echo "::notice::Current tag is $TAG (not v0.2.1); release pipeline validation still executed."
          fi

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: verify-tag
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config libgtk-3-dev
      - name: Run quality gate
        shell: bash
        run: |
          set -euo pipefail
          cargo run -p devtools --manifest-path rust_tools_suite/Cargo.toml -- validate --strict
          cargo fmt --check --manifest-path robot_control_rust/Cargo.toml
          cargo fmt --check --manifest-path rust_tools_suite/Cargo.toml
          cargo clippy --manifest-path robot_control_rust/Cargo.toml --all-targets -- -D warnings
          cargo clippy --manifest-path rust_tools_suite/Cargo.toml --all-targets -- -D warnings
          cargo test --manifest-path robot_control_rust/Cargo.toml
          cargo test --manifest-path rust_tools_suite/Cargo.toml
          RUSTDOCFLAGS="-D warnings" cargo doc --manifest-path robot_control_rust/Cargo.toml --no-deps
          RUSTDOCFLAGS="-D warnings" cargo doc --manifest-path rust_tools_suite/Cargo.toml --no-deps

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: scripts/go/rusktask/go.mod
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress
      - name: Build binaries
        shell: pwsh
        run: |
          cargo build --release -p robot_control
          cargo build --release -p tools_suite
          cargo build --release -p devtools
      - name: Create Windows installer
        shell: pwsh
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          $version = "$env:VERSION" -replace '^v', ''
          if ($version -notmatch '^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$') {
            Write-Error "Invalid version format: $version"
            exit 1
          }
          $content = Get-Content ".github/workflows/installer.nsi" -Raw
          $content = $content -replace '\$\{VERSION\}', $version
          $content = $content -replace '\$VERSION', $version
          $content | Out-File -FilePath "installer.nsi" -Encoding UTF8
          & "C:\Program Files (x86)\NSIS\makensis.exe" "installer.nsi"
      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: robot_control_suite_*_windows_x64-setup.exe
      - name: Create Windows portable ZIP
        shell: pwsh
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          $version = "$env:VERSION" -replace '^v', ''
          $zipName = "robot_control_suite_${version}_windows_x64_portable.zip"
          $files = @(
            "target/release/robot_control.exe",
            "target/release/tools_suite.exe",
            "target/release/devtools.exe",
            "docs/help/index.html",
            "robot_control_rust/ARCHITECTURE_AND_USAGE.md"
          )
          Compress-Archive -Path $files -DestinationPath $zipName -Force
      - name: Upload Windows portable
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: robot_control_suite_*_windows_x64_portable.zip

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config libgtk-3-dev
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build binaries
        run: |
          cargo build --release -p robot_control
          cargo build --release -p tools_suite
          cargo build --release -p devtools
      - name: Create Debian package
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${VERSION#v}"

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::Invalid version format: $version"
            exit 1
          fi

          pkg_dir="dist/debian"
          mkdir -p "$pkg_dir/usr/local/bin"
          mkdir -p "$pkg_dir/usr/local/share/applications"

          cp target/release/robot_control "$pkg_dir/usr/local/bin/"
          cp target/release/tools_suite "$pkg_dir/usr/local/bin/"
          cp target/release/devtools "$pkg_dir/usr/local/bin/"

          mkdir -p "$pkg_dir/DEBIAN"
          printf '%s\n' \
            "Package: robot-control-suite" \
            "Version: ${version}" \
            "Section: utils" \
            "Priority: optional" \
            "Architecture: amd64" \
            "Description: Robot Control and Tools Suite" \
            > "$pkg_dir/DEBIAN/control"

          dpkg-deb --build "$pkg_dir" "dist/robot_control_suite_${version}_amd64.deb"
      - name: Upload Linux package
        uses: actions/upload-artifact@v4
        with:
          name: linux-package
          path: dist/*_amd64.deb

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-linux
    steps:
      - uses: actions/checkout@v4
      - name: Validate release notes policy
        shell: bash
        run: |
          set -euo pipefail
          notes_file="release_notes/RELEASE_NOTES_${GITHUB_REF_NAME}.md"
          test -f "$notes_file"
          test -s "$notes_file"
          ./scripts/ubuntu/task.sh release-notes-validate RELEASE_NOTES_FILE="$notes_file" RELEASE_NOTES_MODE="release"
      - uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts
      - uses: actions/download-artifact@v4
        with:
          name: linux-package
          path: artifacts
      - uses: actions/download-artifact@v4
        with:
          name: windows-portable
          path: artifacts
      - name: Create checksums
        shell: bash
        run: |
          set -euo pipefail
          cd artifacts
          sha256sum *.exe *.deb *.zip > checksums-sha256.txt
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: release_notes/RELEASE_NOTES_${{ github.ref_name }}.md
          files: |
            artifacts/*.exe
            artifacts/*.deb
            artifacts/*_portable.zip
            artifacts/checksums-sha256.txt

  publish-draft-on-failure:
    name: Publish Draft Release On Failure
    if: ${{ always() && failure() }}
    runs-on: ubuntu-latest
    needs:
      - verify-tag
      - quality-gate
      - build-windows
      - build-linux
      - publish-release
    steps:
      - name: Create failure summary
        run: |
          cat > failure-summary.md << 'EOF'
          Automatic draft release generated because release workflow did not fully succeed.

          Job results:
          - verify-tag: ${{ needs.verify-tag.result }}
          - quality-gate: ${{ needs.quality-gate.result }}
          - build-windows: ${{ needs.build-windows.result }}
          - build-linux: ${{ needs.build-linux.result }}
          - publish-release: ${{ needs.publish-release.result }}

          Next actions:
          1. Inspect the failed job logs.
          2. Fix the issue and re-run release workflow.
          3. Use rollback script if the tag should be revoked.
          EOF
      - name: Create Draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: failure-summary.md
