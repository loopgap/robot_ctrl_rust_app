name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify-tag:
    name: Verify Tag Policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate tag format and branch ancestry
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::Invalid tag format: $TAG"
            exit 1
          fi

          git fetch origin main master --quiet || true

          has_base=0
          if git show-ref --verify --quiet refs/remotes/origin/main; then
            has_base=1
            if git merge-base --is-ancestor HEAD origin/main; then
              echo "::notice::Tag commit is reachable from origin/main"
              exit 0
            fi
          fi

          if git show-ref --verify --quiet refs/remotes/origin/master; then
            has_base=1
            if git merge-base --is-ancestor HEAD origin/master; then
              echo "::notice::Tag commit is reachable from origin/master"
              exit 0
            fi
          fi

          if [[ "$has_base" -eq 0 ]]; then
            echo "::error::Neither origin/main nor origin/master exists; cannot verify tag ancestry"
          else
            echo "::error::Tag commit must be reachable from origin/main or origin/master"
          fi
          exit 1

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: verify-tag
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: scripts/go/rusktask/go.mod
      - name: Process file residue audit
        shell: bash
        run: |
          set -euo pipefail
          cd scripts/go/rusktask
          go run . workspace-cleanup --mode audit --strict
      - name: Workspace structure guard
        shell: bash
        run: |
          set -euo pipefail
          cd scripts/go/rusktask
          go run . workspace-guard --mode audit --strict
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config libgtk-3-dev
      - name: Run release quality gate across projects
        shell: bash
        run: |
          set -euo pipefail

          run_fmt_check() {
            local project="$1"
            local manifest="$2"
            echo "::group::fmt $project"
            cargo fmt --check --manifest-path "$manifest"
            echo "::endgroup::"
          }

          run_clippy_check() {
            local project="$1"
            local manifest="$2"
            echo "::group::clippy $project"
            cargo clippy --manifest-path "$manifest" --all-targets -- -D warnings
            echo "::endgroup::"
          }

          run_test_check() {
            local project="$1"
            local manifest="$2"
            echo "::group::test $project"
            cargo test --manifest-path "$manifest"
            echo "::endgroup::"
          }

          run_doc_check() {
            local project="$1"
            local manifest="$2"
            echo "::group::doc $project"
            RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --manifest-path "$manifest"
            echo "::endgroup::"
          }

          run_fmt_check "robot_control_rust" "robot_control_rust/Cargo.toml"
          run_clippy_check "robot_control_rust" "robot_control_rust/Cargo.toml"
          run_test_check "robot_control_rust" "robot_control_rust/Cargo.toml"
          run_doc_check "robot_control_rust" "robot_control_rust/Cargo.toml"

          run_fmt_check "rust_tools_suite" "rust_tools_suite/Cargo.toml"
          run_clippy_check "rust_tools_suite" "rust_tools_suite/Cargo.toml"
          run_test_check "rust_tools_suite" "rust_tools_suite/Cargo.toml"
          run_doc_check "rust_tools_suite" "rust_tools_suite/Cargo.toml"

  build-windows-assets:
    name: Build Windows Release Assets
    runs-on: windows-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: scripts/go/rusktask/go.mod
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: mdbook
      - name: Build robot_control_rust.exe
        shell: bash
        run: |
          set -euo pipefail
          if grep -q 'println!("placeholder")' robot_control_rust/src/main.rs; then
            echo "::error::Entrypoint guard failed: main.rs still contains placeholder implementation"
            exit 1
          fi
          cargo build --release --manifest-path robot_control_rust/Cargo.toml
      - name: Build rust_tools_suite.exe
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --manifest-path rust_tools_suite/Cargo.toml
      - name: Build Windows installer
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          cd scripts/go/rusktask
          go run . package-windows-installer --version "$version" --skip-build
      - name: Build portable release assets
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"

          cd scripts/go/rusktask
          go run . package-windows-assets --version "$version" --output-dir release_artifacts --skip-build
          cd ../..

          setup=$(ls -t robot_control_rust/dist/windows-x64/installer/*_Setup.exe 2>/dev/null | head -n1 || true)
          if [[ -z "$setup" ]]; then
            echo "::error::Setup.exe not found under robot_control_rust/dist/windows-x64/installer"
            exit 1
          fi

          cp "release_artifacts/robot_control_rust_${version}_windows_x64_portable.zip" "release_artifacts/robot_control_rust_windows_x64_portable.zip"
          cp "release_artifacts/rust_tools_suite_${version}_windows_x64_portable.zip" "release_artifacts/rust_tools_suite_windows_x64_portable.zip"
          cp "$setup" "release_artifacts/RobotControlSuite_Setup.exe"
      - name: Upload Windows release assets
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-assets
          path: |
            release_artifacts/robot_control_rust_windows_x64_portable.zip
            release_artifacts/rust_tools_suite_windows_x64_portable.zip
            release_artifacts/RobotControlSuite_Setup.exe

  build-linux-assets:
    name: Build Linux Release Assets
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: mdbook
      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config libgtk-3-dev dpkg-dev
      - name: Build Debian package
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          bash rust_tools_suite/packaging/package_deb.sh --version "$version"
          cp "dist/debian/rust-tools-suite_${version}_amd64.deb" "dist/debian/rust_tools_suite_linux_amd64.deb"
      - name: Upload Linux release assets
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-assets
          path: dist/debian/rust_tools_suite_linux_amd64.deb

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows-assets
      - build-linux-assets
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: scripts/go/rusktask/go.mod
      - name: Validate release notes policy
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/task release-notes-validate \
            RELEASE_NOTES_FILE="release_notes/RELEASE_NOTES_${GITHUB_REF_NAME}.md" \
            RELEASE_NOTES_MODE="release"
      - uses: actions/download-artifact@v4
        with:
          name: windows-release-assets
          path: artifacts
      - uses: actions/download-artifact@v4
        with:
          name: linux-release-assets
          path: artifacts
      - name: Verify required assets
        shell: bash
        run: |
          set -euo pipefail
          test -f artifacts/robot_control_rust_windows_x64_portable.zip
          test -f artifacts/rust_tools_suite_windows_x64_portable.zip
          test -f artifacts/rust_tools_suite_linux_amd64.deb
          test -f artifacts/RobotControlSuite_Setup.exe
          test -f release_notes/RELEASE_NOTES_${GITHUB_REF_NAME}.md
          test -s release_notes/RELEASE_NOTES_${GITHUB_REF_NAME}.md
      - name: Create checksums
        shell: bash
        run: |
          set -euo pipefail
          cd artifacts
          sha256sum \
            robot_control_rust_windows_x64_portable.zip \
            rust_tools_suite_windows_x64_portable.zip \
            rust_tools_suite_linux_amd64.deb \
            RobotControlSuite_Setup.exe > checksums-sha256.txt
      - name: Publish exact release asset set
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: release_notes/RELEASE_NOTES_${{ github.ref_name }}.md
          files: |
            artifacts/robot_control_rust_windows_x64_portable.zip
            artifacts/rust_tools_suite_windows_x64_portable.zip
            artifacts/rust_tools_suite_linux_amd64.deb
            artifacts/RobotControlSuite_Setup.exe
            artifacts/checksums-sha256.txt

  publish-draft-on-failure:
    name: Publish Draft Release On Failure
    if: ${{ always() && failure() }}
    runs-on: ubuntu-latest
    needs:
      - verify-tag
      - quality-gate
      - build-windows-assets
      - build-linux-assets
      - publish-release
    steps:
      - name: Create failure summary
        run: |
          cat > failure-summary.md << 'EOF'
          Automatic draft release generated because release workflow did not fully succeed.

          Job results:
          - verify-tag: ${{ needs.verify-tag.result }}
          - quality-gate: ${{ needs.quality-gate.result }}
          - build-windows-assets: ${{ needs.build-windows-assets.result }}
          - build-linux-assets: ${{ needs.build-linux-assets.result }}
          - publish-release: ${{ needs.publish-release.result }}

          Next actions:
          1. Inspect the failed job logs.
          2. Fix the issue and re-run release workflow.
          3. Use rollback script if the tag should be revoked.
          EOF
      - name: Create Draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: failure-summary.md
