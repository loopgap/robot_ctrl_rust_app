name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workspace-governance:
    name: Workspace Governance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Process file residue audit
        shell: pwsh
        run: |
          ./scripts/cleanup-process-files.ps1 -Mode audit -Strict
      - name: Workspace structure guard
        shell: pwsh
        run: |
          ./scripts/enforce-workspace-structure.ps1 -Mode audit -Strict

  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    needs: workspace-governance
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting across projects
        shell: bash
        run: |
          set -euo pipefail

          run_fmt_check() {
            local project="$1"
            local manifest="$2"
            echo "::group::fmt $project"
            cargo fmt --check --manifest-path "$manifest"
            echo "::endgroup::"
          }

          run_fmt_check "robot_control_rust" "robot_control_rust/Cargo.toml"
          run_fmt_check "rust_micro_tools" "rust_micro_tools/Cargo.toml"
          for dir in rust_indie_tools/*/; do
            if [ -f "${dir}Cargo.toml" ]; then
              run_fmt_check "${dir%/}" "${dir}Cargo.toml"
            fi
          done

  clippy:
    name: Clippy
    runs-on: ${{ matrix.os }}
    needs: workspace-governance
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config libgtk-3-dev
      - name: Run clippy across projects
        shell: bash
        run: |
          set -euo pipefail

          run_clippy_check() {
            local project="$1"
            local manifest="$2"
            echo "::group::clippy $project"
            cargo clippy --manifest-path "$manifest" --all-targets -- -D warnings
            echo "::endgroup::"
          }

          run_clippy_check "robot_control_rust" "robot_control_rust/Cargo.toml"
          run_clippy_check "rust_micro_tools" "rust_micro_tools/Cargo.toml"
          for dir in rust_indie_tools/*/; do
            if [ -f "${dir}Cargo.toml" ]; then
              run_clippy_check "${dir%/}" "${dir}Cargo.toml"
            fi
          done

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    needs: workspace-governance
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config libgtk-3-dev
      - name: Run tests across projects
        shell: bash
        run: |
          set -euo pipefail

          run_test_check() {
            local project="$1"
            local manifest="$2"
            echo "::group::test $project"
            cargo test --manifest-path "$manifest"
            echo "::endgroup::"
          }

          run_test_check "robot_control_rust" "robot_control_rust/Cargo.toml"
          run_test_check "rust_micro_tools" "rust_micro_tools/Cargo.toml"
          for dir in rust_indie_tools/*/; do
            if [ -f "${dir}Cargo.toml" ]; then
              run_test_check "${dir%/}" "${dir}Cargo.toml"
            fi
          done

  doc:
    name: Docs
    runs-on: ubuntu-latest
    needs: workspace-governance
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config libgtk-3-dev
      - name: Build docs across projects
        shell: bash
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: |
          set -euo pipefail

          run_doc_check() {
            local project="$1"
            local manifest="$2"
            echo "::group::doc $project"
            cargo doc --no-deps --manifest-path "$manifest"
            echo "::endgroup::"
          }

          run_doc_check "robot_control_rust" "robot_control_rust/Cargo.toml"
          run_doc_check "rust_micro_tools" "rust_micro_tools/Cargo.toml"
          for dir in rust_indie_tools/*/; do
            if [ -f "${dir}Cargo.toml" ]; then
              run_doc_check "${dir%/}" "${dir}Cargo.toml"
            fi
          done
