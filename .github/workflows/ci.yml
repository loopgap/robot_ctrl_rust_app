name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workspace-governance:
    name: Workspace Governance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Process file residue audit
        shell: pwsh
        run: ./scripts/cleanup-process-files.ps1 -Mode audit -Strict
      - name: Workspace structure guard
        shell: pwsh
        run: ./scripts/enforce-workspace-structure.ps1 -Mode audit -Strict

  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    needs: workspace-governance
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting across products
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --check --manifest-path robot_control_rust/Cargo.toml
          cargo fmt --check --manifest-path rust_tools_suite/Cargo.toml

  clippy:
    name: Clippy
    runs-on: ${{ matrix.os }}
    needs: workspace-governance
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config libgtk-3-dev
      - name: Run clippy across products
        shell: bash
        run: |
          set -euo pipefail
          cargo clippy --manifest-path robot_control_rust/Cargo.toml --all-targets -- -D warnings
          cargo clippy --manifest-path rust_tools_suite/Cargo.toml --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    needs: workspace-governance
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config libgtk-3-dev
      - name: Run tests across products
        shell: bash
        run: |
          set -euo pipefail
          cargo test --manifest-path robot_control_rust/Cargo.toml
          cargo test --manifest-path rust_tools_suite/Cargo.toml

  doc:
    name: Docs
    runs-on: ubuntu-latest
    needs: workspace-governance
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config libgtk-3-dev
      - name: Build docs across products
        shell: bash
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: |
          set -euo pipefail
          cargo doc --no-deps --manifest-path robot_control_rust/Cargo.toml
          cargo doc --no-deps --manifest-path rust_tools_suite/Cargo.toml
