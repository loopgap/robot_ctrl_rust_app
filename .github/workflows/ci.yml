name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workspace-governance:
    name: Workspace Governance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: scripts/go/rusktask/go.mod
      - name: Process file residue audit
        shell: bash
        run: |
          set -euo pipefail
          cd scripts/go/rusktask
          go run . workspace-cleanup --mode audit --strict
      - name: Workspace structure guard
        shell: bash
        run: |
          set -euo pipefail
          cd scripts/go/rusktask
          go run . workspace-guard --mode audit --strict

  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    needs: workspace-governance
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting across products
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --check --manifest-path robot_control_rust/Cargo.toml
          cargo fmt --check --manifest-path rust_tools_suite/Cargo.toml

  clippy:
    name: Clippy
    runs-on: ${{ matrix.os }}
    needs: workspace-governance
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config libgtk-3-dev
      - name: Run clippy across products
        shell: bash
        run: |
          set -euo pipefail
          cargo clippy --manifest-path robot_control_rust/Cargo.toml --all-targets -- -D warnings
          cargo clippy --manifest-path rust_tools_suite/Cargo.toml --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    needs: workspace-governance
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config libgtk-3-dev
      - name: Run tests across products
        shell: bash
        run: |
          set -euo pipefail
          cargo test --manifest-path robot_control_rust/Cargo.toml
          cargo test --manifest-path rust_tools_suite/Cargo.toml

  doc:
    name: Docs
    runs-on: ubuntu-latest
    needs: workspace-governance
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config libgtk-3-dev
      - name: Build docs across products
        shell: bash
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: |
          set -euo pipefail
          cargo doc --no-deps --manifest-path robot_control_rust/Cargo.toml
          cargo doc --no-deps --manifest-path rust_tools_suite/Cargo.toml

  release-workflow-smoke-test:
    name: Release Workflow Smoke Test
    runs-on: ubuntu-latest
    needs: workspace-governance
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Verify release-related files exist
        shell: bash
        run: |
          set -euo pipefail

          # 1. 验证 Cargo.toml 存在
          if [ ! -f "Cargo.toml" ]; then
            echo "❌ ERROR: Cargo.toml 不存在"
            exit 1
          fi
          echo "✅ Cargo.toml 存在"

          # 2. 验证 Cargo.toml 包含 workspace members
          if ! grep -q 'robot_control_rust' Cargo.toml || ! grep -q 'rust_tools_suite' Cargo.toml; then
            echo "❌ ERROR: Cargo.toml 缺少 workspace members (robot_control_rust, rust_tools_suite)"
            exit 1
          fi
          echo "✅ Cargo.toml 包含 robot_control_rust 和 rust_tools_suite members"

          # 3. 验证 installer.nsi 存在
          if [ ! -f ".github/workflows/installer.nsi" ]; then
            echo "❌ ERROR: .github/workflows/installer.nsi 不存在"
            exit 1
          fi
          echo "✅ .github/workflows/installer.nsi 存在"

          # 4. 验证 release_notes/ 目录存在且包含 RELEASE_NOTES_*.md 文件
          if [ ! -d "release_notes" ]; then
            echo "❌ ERROR: release_notes/ 目录不存在"
            exit 1
          fi
          echo "✅ release_notes/ 目录存在"

          RELEASE_NOTES_FILES=$(ls release_notes/RELEASE_NOTES_*.md 2>/dev/null || true)
          if [ -z "$RELEASE_NOTES_FILES" ]; then
            echo "❌ ERROR: release_notes/ 目录中未找到 RELEASE_NOTES_*.md 文件"
            exit 1
          fi
          echo "✅ release_notes/ 目录包含 RELEASE_NOTES 文件:"
          ls -la release_notes/RELEASE_NOTES_*.md

          echo ""
          echo "🎉 所有 release 相关文件验证通过!"
