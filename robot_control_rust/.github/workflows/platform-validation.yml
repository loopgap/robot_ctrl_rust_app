name: Platform Validation

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: platform-validation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: platform-validation

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            libxcursor-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libgl1-mesa-dev \
            libasound2-dev

      - name: Format check
        run: cargo fmt --check

      - name: Build (debug)
        run: cargo build

      - name: Unit tests
        run: cargo test

      - name: Release tests
        run: cargo test --release

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Release build
        run: cargo build --release

      - name: Collect release binary size (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ci_artifacts | Out-Null
          $bin = "target/release/robot_control_rust.exe"
          if (Test-Path $bin) {
            $size = (Get-Item $bin).Length
            "robot_control_rust.exe,$size" | Out-File -FilePath ci_artifacts/release-size.txt -Encoding utf8
          } else {
            "binary_not_found" | Out-File -FilePath ci_artifacts/release-size.txt -Encoding utf8
            exit 1
          }

      - name: Collect release binary size (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p ci_artifacts
          bin="target/release/robot_control_rust"
          if [ -f "$bin" ]; then
            size=$(stat -c%s "$bin" 2>/dev/null || stat -f%z "$bin")
            echo "robot_control_rust,$size" > ci_artifacts/release-size.txt
          else
            echo "binary_not_found" > ci_artifacts/release-size.txt
            exit 1
          fi

      - name: Upload size artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-size-${{ matrix.os }}
          path: ci_artifacts/release-size.txt
