[graph]
targets = []

[advisories]
# cargo-deny >= 0.19 expects unmaintained scope values.
unmaintained = "workspace"
yanked = "deny"
ignore = [
    # Known indirect dependencies that cannot be upgraded yet
    # Add specific advisory IDs as needed: { id = "RUSTSEC-XXXX-XXXX" }
    "RUSTSEC-2023-0071"
]

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
