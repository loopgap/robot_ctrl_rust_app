[graph]
targets = []

[advisories]
# cargo-deny >= 0.19 expects unmaintained scope values.
unmaintained = "workspace"
yanked = "deny"
ignore = [
    # Known indirect dependencies that cannot be upgraded yet
    # Add specific advisory IDs as needed: { id = "RUSTSEC-XXXX-XXXX" }
    "RUSTSEC-2023-0071",
    # rustls-webpki 0.103.12 - transitive through ureq->rustls
    # Panic requires specific malformed CRL input (low severity, dev HTTP library)
    { id = "RUSTSEC-2026-0104", reason = "transitive dependency via ureq->rustls, no fix available" }
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
